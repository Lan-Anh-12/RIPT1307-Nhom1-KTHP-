<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hệ thống quản lý yêu cầu mượn thiết bị</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px; background-color: #f4f6f9; }
        .container { max-width: 1100px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
        .badge { padding: 5px 10px; border-radius: 12px; font-size: 12px; font-weight: bold; background-color: #e9ecef; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; }
        .modal-content { background: #fff; padding: 25px; border-radius: 10px; width: 500px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .modal-header { font-size: 18px; font-weight: bold; margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .detail-info p { margin: 8px 0; font-size: 14px; }
        .modal-actions { margin-top: 20px; display: flex; gap: 10px; justify-content: flex-end; }
    </style>
</head>
<body>

<div class="container">
    <h2>Danh sách yêu cầu mượn thiết bị</h2>
    <table id="requestTable">
        <thead>
            <tr>
                <th>Mã số</th>
                <th>Người mượn</th>
                <th>Thiết bị</th>
                <th>Ngày mượn</th>
                <th>Hạn trả</th>
                <th>Trạng thái</th>
                <th>Thao tác</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<div class="modal" id="detailModal">
    <div class="modal-content">
        <div class="modal-header">Chi tiết yêu cầu</div>
        <div class="detail-info">
            <p><strong>Thiết bị:</strong> <span id="lblDevice"></span></p>
            <p><strong>Số lượng:</strong> <span id="lblQty"></span></p>
            <p><strong>Ngày mượn:</strong> <span id="lblCreated"></span></p>
            <p><strong>Ngày trả dự kiến:</strong> <span id="lblExpected"></span></p>
            <textarea id="txtNote" style="width:100%; margin-top:10px; padding: 5px;" rows="3" placeholder="Ghi chú xử lý..."></textarea>
        </div>
        <div class="modal-actions">
            <button onclick="closeModal()">Đóng</button>
            <button id="btnApprove" style="background:#28a745; color:white; border:none; padding:8px 15px; cursor:pointer;">Duyệt</button>
            <button id="btnReject" style="background:#dc3545; color:white; border:none; padding:8px 15px; cursor:pointer;">Từ chối</button>
        </div>
    </div>
</div>

<script>
    const API_URL = 'http://localhost:8080/api/requests';
    const basicAuthToken = 'Basic ' + btoa('user:a3a2788c-25b5-4ebb-a779-cd63ae42e1f0');

    window.onload = fetchData;

    async function fetchData() {
        const res = await fetch(`${API_URL}/all`, { headers: { 'Authorization': basicAuthToken } });
        const data = await res.json();
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        
        data.forEach(item => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>REQ-2026-${String(item.idRequest).padStart(3, '0')}</td>
                <td>${item.studentName}</td>
                <td>${item.device}</td>
                <td>${new Date(item.createdAt).toLocaleDateString('vi-VN')}</td>
                <td>${item.expectedReturnDate ? new Date(item.expectedReturnDate).toLocaleDateString('vi-VN') : 'N/A'}</td>
                <td><span class="badge">${item.status}</span></td>
                <td><button onclick="showDetail(${item.idRequest})">Xem</button></td>
            `;
            tbody.appendChild(tr);
        });
    }

    async function showDetail(id) {
        const res = await fetch(`${API_URL}/${id}`, { headers: { 'Authorization': basicAuthToken } });
        const data = await res.json();
        
        document.getElementById('lblDevice').innerText = data.device;
        document.getElementById('lblQty').innerText = data.quantity;
        document.getElementById('lblCreated').innerText = new Date(data.createdAt).toLocaleDateString('vi-VN');
        document.getElementById('lblExpected').innerText = data.expectedReturnDate ? new Date(data.expectedReturnDate).toLocaleDateString('vi-VN') : 'N/A';
        
        const btnApprove = document.getElementById('btnApprove');
        const btnReject = document.getElementById('btnReject');

        // Logic ẩn/hiện nút dựa trên trạng thái
        if (data.status === 'PENDING') {
            btnApprove.style.display = 'inline-block';
            btnApprove.innerText = "Duyệt";
            btnApprove.onclick = () => updateStatus(id, 'APPROVED');
            btnReject.style.display = 'inline-block';
            btnReject.onclick = () => updateStatus(id, 'REJECTED');
        } else if (data.status === 'APPROVED') {
            btnApprove.style.display = 'inline-block';
            btnApprove.innerText = "Ghi nhận đã trả";
            btnApprove.onclick = () => updateStatus(id, 'RETURNED');
            btnReject.style.display = 'none';
        } else {
            btnApprove.style.display = 'none';
            btnReject.style.display = 'none';
        }

        document.getElementById('detailModal').style.display = 'flex';
    }

    async function updateStatus(id, status) {
        await fetch(`${API_URL}/${id}/status`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json', 'Authorization': basicAuthToken },
            body: JSON.stringify({ status: status, note: document.getElementById('txtNote').value })
        });
        closeModal();
        fetchData();
    }

    function closeModal() { document.getElementById('detailModal').style.display = 'none'; }
</script>
</body>
</html>
