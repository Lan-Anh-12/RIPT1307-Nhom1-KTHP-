<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Test API Request Management</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        .controls { margin-bottom: 20px; padding: 15px; border: 1px solid #ddd; background: #f9f9f9; }
        .group { margin-bottom: 15px; }
        #jsonDisplay { 
            background: #272822; color: #f8f8f2; padding: 15px; 
            border-radius: 5px; white-space: pre-wrap; overflow-x: auto; 
        }
    </style>
</head>
<body>

    <h2>Kiểm tra API Request Management</h2>

    <div class="controls">
        <div class="group">
            <button onclick="fetchAll()">Lấy tất cả</button>
            <input type="text" id="nameInput" placeholder="Tên sinh viên...">
            <button onclick="searchByName()">Tìm kiếm theo tên</button>
        </div>
        <div class="group">
            <input type="number" id="idInput" placeholder="ID yêu cầu...">
            <button onclick="getById()">Lấy chi tiết (ID)</button>
        </div>
        <div class="group">
            <input type="text" id="statusInput" placeholder="Trạng thái (APPROVED/RETURNED...)">
            
            <button onclick="updateStatus()" style="background: #ffcc00;">Update Trạng thái</button>
        </div>
    </div>

    <pre id="jsonDisplay">Kết quả sẽ hiển thị ở đây...</pre>

    <script>
        const BASE_URL = 'http://localhost:8080/api/requests';
        const display = document.getElementById('jsonDisplay');

        // Hàm helper hiển thị (tự động format JSON đẹp)
        const show = (data) => display.innerText = JSON.stringify(data, null, 2);

        // 1. Lấy tất cả
        async function fetchAll() {
            const res = await fetch(`${BASE_URL}/all`);
            show(await res.json());
        }

        // 2. Tìm kiếm
        async function searchByName() {
            const name = document.getElementById('nameInput').value;
            const res = await fetch(`${BASE_URL}/search?name=${encodeURIComponent(name)}`);
            show(await res.json());
        }

        // 3. Lấy theo ID
        async function getById() {
            const id = document.getElementById('idInput').value;
            if(!id) return alert("Nhập ID");
            const res = await fetch(`${BASE_URL}/${id}`);
            show(await res.json());
        }

        // 4. Update Trạng thái (PUT)
        async function updateStatus() {
            const id = document.getElementById('idInput').value;
            const status = document.getElementById('statusInput').value;
            // const note = document.getElementById('noteInput').value;
            
            if(!id || !status) return alert("Cần ID và Trạng thái");

            const res = await fetch(`${BASE_URL}/${id}/status`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ status })
            });
            
            // Xử lý dữ liệu trả về là DTO
            if (res.ok) {
                const updatedData = await res.json();
                show(updatedData); // Hiển thị DTO đã update
            } else {
                const errorText = await res.text();
                display.innerText = "Lỗi: " + errorText;
            }
        }
    </script>
</body>
</html>
