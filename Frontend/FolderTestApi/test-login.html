<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test API Đăng Nhập</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 50px; background-color: #f4f4f9; }
        .card { max-width: 400px; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        button { width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #0056b3; }
        #result { margin-top: 20px; padding: 15px; border-radius: 4px; display: none; word-break: break-all; }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>

<div class="card">
    <h2>Đăng Nhập Hệ Thống</h2>
    <form id="loginForm">
        <div class="form-group">
            <label for="email">Email tài khoản test:</label>
            <input type="email" id="email" value="tranlananh12bpt@gmail.com" required>
        </div>
        <div class="form-group">
            <label for="password">Mật khẩu chữ thường:</label>
            <input type="password" id="password" value="123456" required>
        </div>
        <button type="submit">Bấm để Test kết nối API</button>
    </form>

    <div id="result"></div>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault(); // Chặn trang web bị load lại
        
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const resultDiv = document.getElementById('result');
        
        resultDiv.style.display = 'none';
        resultDiv.className = '';

        try {
            // Thực hiện bắn API sang cổng Spring Boot (Port 8080)
            const response = await fetch('http://localhost:8080/api/auth/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ email: email, password: password })
            });

            const data = await response.json();

            if (response.ok) {
                // Đăng nhập thành công -> Hiển thị Token trả về
                resultDiv.style.display = 'block';
                resultDiv.className = 'success';
                resultDiv.innerHTML = `
                    <strong>🎉 Đăng nhập thành công!</strong><br><br>
                    <strong>Xin chào:</strong> ${data.name} (${data.role})<br><br>
                    <strong>JWT Token nhận được (FE tự quản lý, không lưu DB):</strong><br> 
                    <span style="font-size: 12px; color: #555;">${data.token}</span>
                `;
            } else {
                // Backend báo lỗi mật khẩu/email sai
                resultDiv.style.display = 'block';
                resultDiv.className = 'error';
                resultDiv.innerHTML = `<strong>❌ Lỗi:</strong> ${data.message || 'Đăng nhập thất bại!'}`;
            }
        } catch (error) {
            // Không kết nối được đến Server (Server sập hoặc chưa bật)
            resultDiv.style.display = 'block';
            resultDiv.className = 'error';
            resultDiv.innerHTML = `<strong>🛑 Không thể kết nối tới Backend!</strong> <br>Hãy kiểm tra xem bạn đã chạy ứng dụng Spring Boot trên cổng 8080 chưa.`;
        }
    });
</script>

</body>
</html>
